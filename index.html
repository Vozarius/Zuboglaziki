<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server</title>
    
    <!-- Резервный пиксельный шрифт с поддержкой кириллицы (если нет локального файла) -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* 
        РАСКОММЕНТИРУЙ И ИЗМЕНИ ПУТЬ, ЕСЛИ У ТЕБЯ ЕСТЬ ФАЙЛ ШРИФТА:
        @font-face {
            font-family: 'Minecraft Rus';
            src: url('fonts/MinecraftRus.ttf') format('truetype');
        }
        */

        :root {
            /* Замени 'Press Start 2P' на 'Minecraft Rus' если используешь свой файл */
            --main-font: 'Press Start 2P', 'Courier New', monospace; 
            --accent-color: #55FFFF;
            --btn-bg: #111155;
            --btn-border: #3333AA;
            --btn-hover: #222277;
            --text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Скрываем скролл, чтобы фон не вылезал при движении */
            font-family: var(--main-font);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2b2b2b;
        }

        /* Анимированный размытый фон */
        .background {
            position: absolute;
            top: -5%; 
            left: -5%;
            width: 110%; /* С запасом, чтобы при сдвиге не было видно краев */
            height: 110%;
            /* СЮДА ВСТАВЬ СВОЮ КАРТИНКУ ФОНА ИЛИ GIF */
            background-image: "Background.png";
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.4); /* Блюр и затемнение */
            z-index: -1;
            transition: transform 0.1s ease-out; /* Плавность следования за мышью */
        }

        /* Контейнер со всем контентом */
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            text-align: center;
            width: 100%;
            max-width: 600px;
            gap: 40px;
        }

        /* Логотип */
        .logo {
            max-width: 100%;
            height: auto;
            image-rendering: pixelated; /* Сохраняет пиксельность логотипа */
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.5));
        }

        /* Секция с IP и версией */
        .info-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-shadow: var(--text-shadow);
            font-size: 14px;
            line-height: 1.5;
        }

        .ip-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .ip-address {
            color: var(--accent-color);
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .ip-address:hover {
            color: #FFFFFF;
            transform: scale(1.05);
        }

        /* Кнопка скачивания */
        .download-btn {
            display: inline-block;
            background-color: var(--btn-bg);
            color: white;
            text-decoration: none;
            padding: 20px 40px;
            border: 2px solid var(--btn-border);
            font-size: 14px;
            line-height: 1.5;
            cursor: pointer;
            text-shadow: var(--text-shadow);
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5);
            transition: background-color 0.2s, transform 0.1s;
        }

        .download-btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 4px 6px 0px rgba(0, 0, 0, 0.5);
        }

        .download-btn:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }

        /* Секция Discord */
        .discord-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: #ccc;
            text-decoration: none;
            font-size: 10px;
            line-height: 1.5;
            text-shadow: var(--text-shadow);
            transition: color 0.2s;
        }

        .discord-link:hover {
            color: white;
        }

        .discord-icon {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

    </style>
</head>
<body>

    <!-- Слой фона для параллакс эффекта -->
    <div class="background" id="bg"></div>

    <div class="content">
        <!-- Логотип (положи файл Logo.png в папку с сайтом) -->
        <img src="Logo.png" alt="Server Logo" class="logo" onerror="this.src='https://via.placeholder.com/400x120/000/fff?text=Logo.png'">

        <div class="info-section">
            <div class="ip-wrapper">
                <span>IP:</span>
                <span class="ip-address" id="ip" title="Нажми, чтобы скопировать">XX.XX.XX.XX:XXXXX</span>
            </div>
            <div>Minecraft 1.21.1</div>
        </div>

        <!-- Кнопка скачивания. Атрибут 'download' заставляет скачивать файл, а не открывать -->
        <a href="path/to/your/modpack.zip" download="ServerMods.zip" class="download-btn">
            Скачать/обновить<br>моды
        </a>

        <!-- Discord -->
        <a href="https://discord.gg/ТВОЯ_ССЫЛКА" target="_blank" class="discord-link">
            <!-- SVG иконка Discord, чтобы не грузить картинками -->
            <svg class="discord-icon" viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.3,46,96.19,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
            <span>Кликабельная ссылка<br>на дс сервер</span>
        </a>
    </div>

    <script>
        // --- 1. Копирование IP по клику ---
        const ipElement = document.getElementById('ip');
        const originalIpText = ipElement.innerText;

        ipElement.addEventListener('click', () => {
            // Копируем текст в буфер обмена
            navigator.clipboard.writeText(originalIpText).then(() => {
                // Меняем текст на "Скопировано!"
                ipElement.innerText = "Скопировано!";
                ipElement.style.color = "#55FF55"; // Зеленый цвет для успеха
                
                // Возвращаем обратно через 1.5 секунды
                setTimeout(() => {
                    ipElement.innerText = originalIpText;
                    ipElement.style.color = ""; // Возвращаем дефолтный цвет из CSS
                }, 1500);
            });
        });

        // --- 2. Параллакс эффект для фона ---
        const bg = document.getElementById('bg');
        const moveAmount = 20; // Максимальное смещение фона в пикселях

        document.addEventListener('mousemove', (e) => {
            // Вычисляем позицию мыши от -1 до 1 относительно центра экрана
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;

            // Сдвигаем фон в противоположную сторону (умножаем на -1 для глубины)
            bg.style.transform = `translate(${x * moveAmount * -1}px, ${y * moveAmount * -1}px)`;
        });
    </script>
</body>
</html>
